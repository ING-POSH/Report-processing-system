version: '3.8'

services:
  # Database Service
  database:
    image: postgres:15-alpine
    container_name: report_db
    environment:
      POSTGRES_DB: report_processing
      POSTGRES_USER: report_user
      POSTGRES_PASSWORD: report_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - report_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report_user -d report_processing"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: report_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - report_network
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Service
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: report_backend
    environment:
      - DATABASE_URL=postgresql://report_user:report_password_123@database:5432/report_processing
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=production
      - SECRET_KEY=your_secret_key_here_change_in_production
      - OPENAI_API_KEY=your_openai_api_key_here
      - MAX_FILE_SIZE=52428800
      - UPLOAD_FOLDER=/app/uploads
      - PROCESSED_FOLDER=/app/processed
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
      - ./logs:/app/logs
      - ./temp:/app/temp
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - report_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: report_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - report_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: report_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - report_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  report_network:
    driver: bridge
    name: report_processing_network

# Production overrides
x-production: &production-config
  deploy:
    replicas: 1
    resources:
      limits:
        memory: 1G
        cpus: '0.75'
      reservations:
        memory: 512M
        cpus: '0.25'
    restart_policy:
      condition: on-failure
      delay: 5s
      max_attempts: 3